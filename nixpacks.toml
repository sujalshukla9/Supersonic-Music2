[phases.setup]
nixPkgs = ["nodejs_20", "python311", "python311Packages.pip", "ffmpeg"]

[phases.install]
cmds = [
    "npm install",
    "cd backend && npm install",
    "pip install --user yt-dlp ytmusicapi"
]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "cd backend && node server.js"

[variables]
NODE_ENV = "production"
