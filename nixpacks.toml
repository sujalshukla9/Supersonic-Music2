[phases.setup]
# Install Node.js 20, Python 3.11 with pip, and ffmpeg
nixPkgs = ["nodejs_20", "python311", "python311Packages.pip", "ffmpeg"]

# Create Python virtual environment
cmds = ["python3 -m venv /opt/venv"]

[phases.install]
# Set up PATH to include virtual environment
dependsOn = ["setup"]

cmds = [
    "export PATH=/opt/venv/bin:$PATH",
    "pip install --upgrade pip",
    "pip install yt-dlp ytmusicapi",
    "npm install",
    "cd backend && npm install --omit=dev"
]

[phases.build]
dependsOn = ["install"]
cmds = ["npm run build"]

[start]
cmd = "export PATH=/opt/venv/bin:$PATH && cd backend && node server.js"

[variables]
NODE_ENV = "production"
PATH = "/opt/venv/bin:${PATH}"
