# Nixpacks configuration (alternative to Dockerfile)
# Railway can use this if you prefer Nixpacks over Docker
# https://nixpacks.com/docs/configuration/file

[phases.setup]
nixPkgs = ["nodejs_20", "python311", "python311Packages.pip", "ffmpeg"]

[phases.install]
cmds = [
    "npm ci --omit=dev",
    "pip install --user yt-dlp ytmusicapi"
]

[start]
cmd = "node server.js"

[variables]
NODE_ENV = "production"
